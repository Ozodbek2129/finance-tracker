<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Telegramning o'z ranglariga moslashish (Mavzuga qarab o'zgaradi) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px; /* Telefon ekranidan chiqib ketmaydi */
            box-sizing: border-box;
        }

        h1 { 
            color: var(--tg-theme-button-color, #34c759); 
            font-size: 24px; 
            margin-top: 0;
        }

        .balance { 
            font-size: 36px; 
            font-weight: 700; 
            margin: 24px 0; 
            color: #ffd700; 
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(255,255,255,0.05);
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #34c759);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active { 
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🪙 Coin Tracker</h1>
    <p>Salom, <span id="username">Foydalanuvchi</span>!</p>
    
    <div class="balance">$<span id="balance-val">1000</span></div>

    <input type="number" id="amount" placeholder="Summani kiriting...">
    <button onclick="addExpense()">Xarajatni qo'shish</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); // Telegramga tayyorligimizni bildiramiz
    tg.expand(); // Ilovani to'liq ekranga yoyamiz

    // Telegramdan foydalanuvchi ismini olish
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
    }

    let currentBalance = 1000;

    function addExpense() {
        const amountInput = document.getElementById('amount');
        const amount = parseFloat(amountInput.value);

        if (!amount || amount <= 0) {
            tg.showAlert("Iltimos, to'g'ri summa kiriting!");
            return;
        }

        currentBalance -= amount;
        document.getElementById('balance-val').innerText = currentBalance;
        amountInput.value = '';

        tg.showAlert(`Muvaffaqiyatli qo'shildi: $${amount}`);
    }
</script>

</body>
</html>
